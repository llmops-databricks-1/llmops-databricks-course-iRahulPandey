bundle:
  name: llmops-databricks-course-iRahulPandey

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"
  schedule_pause_status:
    description: "Schedule pause status"
    default: PAUSED

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  stg:
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com # Replace with your acc workspace host
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      schedule_pause_status: PAUSED

  prd:
    workspace:
      host: https://dbc-8943fe10-4fbf.cloud.databricks.com # Replace with your prd workspace host
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      schedule_pause_status: UNPAUSED
