resources:
  jobs:
    book_recommender_ingestion_job:
      name: book-recommender-ingestion
      tags:
        project_name: "llmops-databricks-course-iRahulPandey"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: ingest_book_summaries
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/1_book_summaries_ingestion.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
